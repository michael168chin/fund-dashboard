  const rates = COI_TABLE[safeAge] || COI_TABLE[110];
  return rates[gender === '男性' ? 'M' : 'F'];

const formatCurrency = (value) => {
  if (value === undefined || value === null || isNaN(value)) return '0';
  return new Intl.NumberFormat('zh-TW', { style:'decimal', minimumFractionDigits:0, maximumFractionDigits:0 }).format(value);
};
const formatUnit = (value) => {
  if (value === undefined || value === null || isNaN(value)) return '0.00';
  return new Intl.NumberFormat('zh-TW', { style:'decimal', minimumFractionDigits:2, maximumFractionDigits:2 }).format(value);
};

const CustomizedAxisTick = (props) => {
  const { x, y, payload, customDy } = props;
  if (!payload || !payload.value) return null;
  const parts = payload.value.split('/');
  const year = parts[0].trim();
  const age  = parts[parts.length - 1].trim();
  if (parts.length < 2) return <g transform={`translate(${x},${y})`}><text x={0} y={0} dy={16} textAnchor="middle" fill="#666">{payload.value}</text></g>;
  return (
    <g transform={`translate(${x},${y})`}>
      <text x={0} y={0} dy={customDy||40} textAnchor="middle" fill="#666" fontSize={11}
        fontFamily="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Liberation Mono','Courier New',monospace">
        <tspan x="0" dy="0">第{year}年</tspan>
        <tspan x="0" dy="16">{age}歲</tspan>
      </text>
    </g>
  );

      const text = await response.text();
      const rows = text.split(/\r?\n/).map(row =>
        row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell =>
          cell.trim().replace(/^"|"$/g,'').replace(/""/g,'"')

      );
      const getVal = (rowIdx, colIdx=2) => {
        if (rows[rowIdx-1] && rows[rowIdx-1][colIdx]) {
          const val = rows[rowIdx-1][colIdx].trim().replace('\r','');
          return val==='' ? null : val;
        }
        return null;

      const newConfig = { ...defaultConfig };
      const c4 = getVal(4);
      let authEnabled = true;
      if (c4 !== null) authEnabled = c4.toLowerCase()==='true';

      if (!authEnabled) setIsAuthenticated(true);

      const mapVal = (key, row, type='number') => {
        const val = getVal(row);
        if (val !== null) {
          if (type==='number') {
            const num = parseFloat(val.replace(/,/g,'').replace(/[^\d.-]/g,''));
            if (!isNaN(num)) newConfig[key] = num;

    const UNIT=10000, INITIAL_NAV=10;
    let initial_B_units=(config.B_mdp*UNIT)/INITIAL_NAV;
    let current_B_units=initial_B_units, current_B_price=INITIAL_NAV;
    let current_C_val=config.C_gp*UNIT, current_SA_val=config.SA_sumAssured*UNIT;
    const A_total_val=(config.B_mdp+config.C_gp)*UNIT;
    const monthly_E_rate=Math.pow(1+config.E_navChange/100,1/12)-1;
    const monthly_F_rate=Math.pow(1+config.F_growth/100,1/12)-1;
    const inputAge=parseFloat(config.AG_age);
    const startYearBase=Math.floor(inputAge);
    const startMonthsOffset=Math.round((inputAge%1)*12);
    const initialCompletedMonths=startMonthsOffset>0?startMonthsOffset-1:0;
    let prev_month_units=current_B_units, prev_year_units=current_B_units;
    let pending_mgmt_fee=0, pending_ins_cost=0;
    let next_year_bonus_amount_B=0, next_year_bonus_amount_C=0;
    let total_accumulated_bonus=0;

    for (let year=1; year<=config.N_years; year++) {
      if (config.SA_adj1_year>0&&year===config.SA_adj1_year) current_SA_val=config.SA_adj1_amount*UNIT;
      if (config.SA_adj2_year>0&&year===config.SA_adj2_year) current_SA_val=config.SA_adj2_amount*UNIT;
      if (config.SA_adj3_year>0&&year===config.SA_adj3_year) current_SA_val=config.SA_adj3_amount*UNIT;
      let annual_value_added=0;
      if (year>=6) {
        const bonus_units_B=next_year_bonus_amount_B/current_B_price;
        current_B_units+=bonus_units_B; current_C_val+=next_year_bonus_amount_C;
        annual_value_added=next_year_bonus_amount_B+next_year_bonus_amount_C;
        total_accumulated_bonus+=annual_value_added;
      }
      let annual_dividend=0,annual_cash_payout=0,annual_HL=0,annual_FLINT=0,annual_policy=0;
      let annual_free_cash=0,annual_insurance_cost=0,annual_mgmt_fee=0;
      let annual_transfer_amount=0,annual_total_reinvest=0;
      let sum_month_end_B_val=0,sum_month_end_C_val=0;
      const yearStartTotalMonths=initialCompletedMonths+(year-1)*12;
      const ageAtStartOfYear=startYearBase+Math.floor(yearStartTotalMonths/12);

      for (let month=1; month<=12; month++) {
        const current_B_val_start=current_B_units*current_B_price;
        const PV_start=current_B_val_start+current_C_val;
        const currentTotalMonths=initialCompletedMonths+(year-1)*12+(month-1);
        const currentEffectiveAge=startYearBase+Math.floor(currentTotalMonths/12);
        let mgmt_fee_pct=year<=config.H_years?(PV_start*(config.G_mgmtFee/100))/12:0;
        let mgmt_fee_fixed=A_total_val<3000000?100:0;
        const total_mgmt_fee=mgmt_fee_pct+mgmt_fee_fixed;
        const RS=Math.max(current_SA_val-PV_start,0);
        const coi_rate_per_10k=getCOIRate(currentEffectiveAge,config.GD_gender);
        const insurance_cost=RS>0?(RS/10000)*coi_rate_per_10k*(1+config.mr_loading/100):0;
        let actual_mgmt_deduct=0, actual_ins_deduct=0;
        if (year===1&&month===1) {
          pending_mgmt_fee=total_mgmt_fee; pending_ins_cost=insurance_cost;
        } else if (year===1&&month===2) {
          actual_mgmt_deduct=total_mgmt_fee+pending_mgmt_fee;
          actual_ins_deduct=insurance_cost+pending_ins_cost;
          pending_mgmt_fee=0; pending_ins_cost=0;
        } else {
          actual_mgmt_deduct=total_mgmt_fee; actual_ins_deduct=insurance_cost;
        }
        const total_monthly_deduction=actual_mgmt_deduct+actual_ins_deduct;
        if (current_C_val>=total_monthly_deduction) {
          current_C_val-=total_monthly_deduction;
        } else {
          const remainder=total_monthly_deduction-current_C_val;
          current_C_val=0;
          current_B_units-=remainder/current_B_price;
        }
        current_B_price*=(1+monthly_E_rate);
        current_C_val*=(1+monthly_F_rate);
        const initial_B_val_full=config.B_mdp*UNIT;
        const base_div_amount=initial_B_val_full*(config.D_divRate/100)/12;
        const monthly_dividend=config.DividendType==='FixedAmount'
          ?(current_B_units/initial_B_units)*base_div_amount
          :(current_B_units*current_B_price)*(config.D_divRate/100)/12;
        const standard_reinvest=monthly_dividend*(config.RP_reinvestRate/100);
        let monthly_HL=0,monthly_FLINT=0,monthly_policy=0;
        let extra_reinvest_HL=0,extra_reinvest_FLINT=0,extra_reinvest_PP=0;
        if (year<=config.HL_years) monthly_HL=config.HL_amount*UNIT;
        else extra_reinvest_HL=(config.HL_amount*UNIT)*(config.Reinvest_HL_Rate/100);
        if (year<=config.FLINT_years) monthly_FLINT=config.FLINT_amount*UNIT;
        else extra_reinvest_FLINT=(config.FLINT_amount*UNIT)*(config.Reinvest_FLINT_Rate/100);
        if (year<=config.Q_policyYears) monthly_policy=config.PP_policy*UNIT;
        else extra_reinvest_PP=(config.PP_policy*UNIT)*(config.Reinvest_PP_Rate/100);
        const total_reinvest=standard_reinvest+extra_reinvest_HL+extra_reinvest_FLINT+extra_reinvest_PP;
        current_B_units+=total_reinvest/current_B_price;
        const actual_cash_payout=monthly_dividend-total_reinvest;
        const monthly_free=actual_cash_payout-monthly_HL-monthly_FLINT-monthly_policy;
        let transfer_amount=0;
        if (year>=config.RY_startYear) {
          transfer_amount=current_C_val*(config.RG_rate/100)/12;
          current_C_val-=transfer_amount;
          current_B_units+=transfer_amount/current_B_price;
        }
        const month_end_B_val=current_B_units*current_B_price;
        sum_month_end_B_val+=month_end_B_val; sum_month_end_C_val+=current_C_val;
        const final_B_val_month=current_B_units*current_B_price;
        const unit_change_month=current_B_units-prev_month_units;
        prev_month_units=current_B_units;
        const total_value_month=final_B_val_month+current_C_val;
        const death_benefit=Math.max(current_SA_val,total_value_month);
        monthlyData.push({
          id:`${year}-${month}`,year,month,age:currentEffectiveAge,
          xAxisLabel:`${year} / ${month} / ${currentEffectiveAge}`,
          mdp:final_B_val_month,units:current_B_units,
          investAmt:total_reinvest+transfer_amount,unitChange:unit_change_month,
          nav:current_B_price,gp:current_C_val,totalValue:total_value_month,
          dividend:monthly_dividend,cashPayout:actual_cash_payout,
          loan_HL:monthly_HL,loan_FLINT:monthly_FLINT,policy:monthly_policy,
          freeCash:monthly_free,insCost:actual_ins_deduct,mgmtFee:actual_mgmt_deduct,
          transfer:transfer_amount,valueAdded:month===1?annual_value_added:0,
          cumulativeBonus:total_accumulated_bonus,stdCOIRate:coi_rate_per_10k,deathBenefit:death_benefit
        });
        annual_dividend+=monthly_dividend; annual_cash_payout+=actual_cash_payout;
        annual_HL+=monthly_HL; annual_FLINT+=monthly_FLINT; annual_policy+=monthly_policy;
        annual_free_cash+=monthly_free; annual_insurance_cost+=actual_ins_deduct;
        annual_mgmt_fee+=actual_mgmt_deduct; annual_transfer_amount+=transfer_amount;
        annual_total_reinvest+=(total_reinvest+transfer_amount);
      }
      const avg_B_val=sum_month_end_B_val/12, avg_C_val=sum_month_end_C_val/12;
      next_year_bonus_amount_B=avg_B_val*0.0025; next_year_bonus_amount_C=avg_C_val*0.0025;
      const final_B_val_year=current_B_units*current_B_price;
      const unit_change_year=current_B_units-prev_year_units;
      prev_year_units=current_B_units;
      const total_value_year=final_B_val_year+current_C_val;
      const death_benefit_year=Math.max(current_SA_val,total_value_year);
      const annual_coi_rate=getCOIRate(ageAtStartOfYear,config.GD_gender);
      annualData.push({
        id:`year-${year}`,year,age:ageAtStartOfYear,
        xAxisLabel:`${year} / ${ageAtStartOfYear}`,
        mdp:final_B_val_year,units:current_B_units,investAmt:annual_total_reinvest,
        unitChange:unit_change_year,gp:current_C_val,totalValue:total_value_year,
        dividend:annual_dividend,cashPayout:annual_cash_payout,loan_HL:annual_HL,
        loan_FLINT:annual_FLINT,policy:annual_policy,freeCash:annual_free_cash,
        transfer:annual_transfer_amount,insCost:annual_insurance_cost,mgmtFee:annual_mgmt_fee,
        valueAdded:annual_value_added,stdCOIRate:annual_coi_rate,
        deathBenefit:death_benefit_year,cumulativeBonus:total_accumulated_bonus
      });
    }
    return { annualData, monthlyData };
  }, [config, isAuthenticated, isAuthEnabled]);

  const displayData = config.ViewMode==='Monthly' ? monthlyData : annualData;

  const referenceLineIndex = useMemo(()=>{
    const startYear=parseFloat(config.RY_startYear);
    if (isNaN(startYear)||startYear<1) return null;
    return config.ViewMode==='Monthly'?(startYear-1)*12:startYear-1;
  },[config.ViewMode,config.RY_startYear]);

  const cumulativeMgmtFee4Years = useMemo(()=>
    annualData.filter(d=>d.year<=4).reduce((s,d)=>s+d.mgmtFee,0),[annualData]);
  const crossoverYear = useMemo(()=>{
    const m=annualData.find(d=>d.cumulativeBonus>cumulativeMgmtFee4Years);
    return m?m.year:null;
  },[annualData,cumulativeMgmtFee4Years]);
  const cumulativeFreeCashAtCustomYear = useMemo(()=>
    annualData.filter(d=>d.year<=config.FreeCash_Year).reduce((s,d)=>s+d.freeCash,0),
    [annualData,config.FreeCash_Year]);
  const totalPPAmount = useMemo(()=>annualData.reduce((s,d)=>s+d.policy,0),[annualData]);
  const freeCashAfterPP = useMemo(()=>{
    const d=annualData.find(x=>x.year===config.Q_policyYears+1);
    return d?d.freeCash:0;
  },[annualData,config.Q_policyYears]);
  const bonusAtTargetYear = useMemo(()=>{
    const d=annualData.find(x=>x.year===config.Bonus_Year);
    return d?d.cumulativeBonus:0;
  },[annualData,config.Bonus_Year]);

  const handleConfigChange = (e) => {
    const { name, value, type, checked } = e.target;
    setTempConfig(prev=>({...prev,[name]:type==='checkbox'?checked:value}));
  };
  const openSettings = () => { setModalPosition({x:0,y:0}); setTempConfig(config); setIsSettingsOpen(true); };
  const saveConfig = () => {
    const newConfig={};
    const strKeys=['title','GD_gender','DividendType','ViewMode','userName',
      'Color_YAxis_Left','Color_YAxis_Right','Color_HL','Color_FLINT','Color_PP',
      'Color_Free','Color_Total','Color_MDP','Color_GP','Color_Death'];
    Object.keys(tempConfig).forEach(key=>{
      if (strKeys.includes(key)) newConfig[key]=tempConfig[key];
      else if (typeof tempConfig[key]==='boolean') newConfig[key]=tempConfig[key];
      else { const p=parseFloat(tempConfig[key]); newConfig[key]=isNaN(p)?0:p; }
    });
    setConfig(newConfig); setIsSettingsOpen(false);
  };
  const resetConfig = () => setTempConfig(defaultConfig);
  const handleMouseDown = (e) => {
    setIsDragging(true);
    setDragOffset({x:e.clientX-modalPosition.x,y:e.clientY-modalPosition.y});
  };
  const handleLogin = (e) => {
    e.preventDefault();
    if (['A32188','89788','317151','321709'].includes(passwordInput)) {
      setIsAuthenticated(true); setLoginError(false);
    } else { setLoginError(true); }
  };
  const handleExportCSV = () => {
    const headers=['時間 (年/月/歲)','月配息組合 (MDP)'];
    if(config.ShowUnits)headers.push('配息基金單位數');
    if(config.ShowInvestAmt)headers.push('投入配息基金金額');
    if(config.ShowUnitChange)headers.push('單位數變動');
    headers.push('成長型組合 (GP)');
    if(config.ShowTransfer)headers.push('成長型轉入金額');
    if(config.ShowStdCOI)headers.push('標準費率');
    headers.push('危險保費 (Ins Cost)','管理費 (Fee)');
    if(config.ShowValueAdded)headers.push('加值給付 (Bonus)');
    headers.push('總配息 (100%)',`現金給付 (${100-config.RP_reinvestRate}%)`,
      '房貸 (HL)','週轉息 (FLINT)','小水庫保單 (PP)','自由活用資金','總帳戶價值 (PV)');
    if(config.ShowDeathBenefit)headers.push('身故保險金');
    const csvRows=displayData.map(row=>{
      const tl=config.ViewMode==='Monthly'?`${row.year}/${row.month}/${row.age}`:`${row.year}/${row.age}`;
      const d=[tl,Math.round(row.mdp)];
      if(config.ShowUnits)d.push(row.units.toFixed(2));
      if(config.ShowInvestAmt)d.push(Math.round(row.investAmt));
      if(config.ShowUnitChange)d.push(row.unitChange.toFixed(2));
      d.push(Math.round(row.gp));
      if(config.ShowTransfer)d.push(Math.round(row.transfer));
      if(config.ShowStdCOI)d.push(row.stdCOIRate);
      d.push(Math.round(row.insCost),Math.round(row.mgmtFee));
      if(config.ShowValueAdded)d.push(Math.round(row.valueAdded));
      d.push(Math.round(row.dividend),Math.round(row.cashPayout),
        Math.round(row.loan_HL),Math.round(row.loan_FLINT),Math.round(row.policy),
        Math.round(row.freeCash),Math.round(row.totalValue));
      if(config.ShowDeathBenefit)d.push(Math.round(row.deathBenefit));
      return d.join(',');
    });
    const csv='\uFEFF'+[headers.join(','),...csvRows].join('\n');
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=`${config.title}_${config.ViewMode==='Monthly'?'月報表':'年報表'}.csv`;
    a.click(); URL.revokeObjectURL(url);
  };

  useEffect(()=>{
    const onMove=(e)=>{ if(isDragging) setModalPosition({x:e.clientX-dragOffset.x,y:e.clientY-dragOffset.y}); };
    const onUp=()=>setIsDragging(false);
    if(isDragging){ window.addEventListener('mousemove',onMove); window.addEventListener('mouseup',onUp); }
    return ()=>{ window.removeEventListener('mousemove',onMove); window.removeEventListener('mouseup',onUp); };
  },[isDragging,dragOffset]);

  useEffect(()=>{ if(isSettingsOpen) setTempConfig(config); },[isSettingsOpen]);

  if (isLoading) return (
    <div className="min-h-screen bg-slate-100 flex items-center justify-center flex-col">
      <Loader2 className="w-10 h-10 text-blue-600 animate-spin mb-4" style={{animation:'spin 1s linear infinite'}}/>
      <p className="text-slate-600 font-medium">正在讀取雲端參數...</p>
      <style>{`@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}.animate-spin{animation:spin 1s linear infinite}`}</style>
    </div>
  );

  if (!isAuthenticated && isAuthEnabled) return (
    <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
      <div className="bg-white max-w-md w-full rounded-2xl shadow-xl p-8 space-y-6">
        <div className="text-center space-y-2">
          <div className="flex flex-col items-center justify-center mb-4">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/67/Allianz_Logo.svg" alt="Allianz Logo"
              className="h-16 w-auto mb-2" onError={e=>e.target.style.display='none'}/>
            <span className="text-slate-500 font-bold tracking-widest text-sm">Allianz 安聯人壽</span>
          </div>
          <div className="bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
            <Lock className="w-8 h-8 text-blue-600"/>
          </div>
          <h1 className="text-2xl font-bold text-slate-800">安全登入</h1>
          <p className="text-slate-500 text-sm">請輸入存取密碼以檢視富貴滿滿現金流模型</p>
        </div>
        <form onSubmit={handleLogin} className="space-y-4">
          <div>
            <input type="password" value={passwordInput} onChange={e=>setPasswordInput(e.target.value)}
              placeholder="請輸入密碼" autoFocus
              className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none text-center text-lg tracking-widest"/>
            {loginError && (
              <div className="flex items-center justify-center gap-1.5 mt-2 text-red-500 text-sm">
                <AlertCircle size={16}/><span>密碼錯誤，請重新輸入</span>
              </div>
            )}
          </div>
          <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition-all">登入</button>
        </form>
        <div className="text-center text-xs text-slate-400">受保護的財務模型系統</div>
      </div>
    </div>
  );

  const stackItems = [
    {key:'loan_HL',name:'房貸 (HL)',fill:config.Color_HL,order:config.Order_HL,show:config.ShowChart_HL},
    {key:'loan_FLINT',name:'週轉息 (FLINT)',fill:config.Color_FLINT,order:config.Order_FLINT,show:config.ShowChart_FLINT},
    {key:'policy',name:'小水庫保單 (PP)',fill:config.Color_PP,order:config.Order_PP,show:config.ShowChart_PP},
    {key:'freeCash',name:'自由資金',fill:config.Color_Free,order:config.Order_Free,show:config.ShowChart_Free}
  ].filter(i=>i.show).sort((a,b)=>a.order-b.order);

  const Toggle = ({name,checked,onChange,color='blue'}) => (
    <label className="relative inline-flex items-center cursor-pointer">
      <input type="checkbox" name={name} checked={checked} onChange={onChange} className="sr-only peer"/>
      <div className={`w-9 h-5 bg-slate-200 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-${color}-600`}></div>
    </label>
  );

  return (
    <div className="min-h-screen bg-slate-50 text-slate-800">
      <header className="bg-slate-900 text-white p-4 shadow-lg sticky top-0 z-20">
        <div className="max-w-7xl mx-auto flex justify-between items-center">
          <div className="flex items-center gap-3">
            <Activity className="h-6 w-6 text-emerald-400"/>
            <div>
              <div className="flex items-center gap-2">
                <h1 className="text-xl font-bold tracking-wide">{config.title}</h1>
                {config.ShowUserName&&config.userName&&<span className="text-lg font-medium text-slate-300">({config.userName})</span>}
              </div>
              <div className="text-xs text-slate-400 font-mono mt-0.5">
                {config.GD_gender} | {config.AG_age}歲 | 保額 {config.SA_sumAssured}萬 | {config.ViewMode==='Monthly'?'月度報表':'年度報表'}
                {config.ShowHeaderMR&&` | 加費比例(mr) ${config.mr_loading}%`}
              </div>
              {config.ShowReinvestNote&&(
                <div className="text-emerald-400/80 font-mono mt-0.5" style={{fontSize:`${config.ReinvestNoteFontSize}px`}}>
                  (第{config.HL_years}年後房貸繳滿後，現金流{config.Reinvest_HL_Rate}%回購配息基金，{100-config.Reinvest_HL_Rate}%轉自由現金流） | (第{config.Q_policyYears}年後小水庫保單繳費期滿後，現金流{config.Reinvest_PP_Rate}%回購配息基金，{100-config.Reinvest_PP_Rate}%轉自由現金流）
                </div>
              )}
            </div>
          </div>
          <button onClick={openSettings} className="flex items-center gap-2 bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg transition-all text-sm font-medium border border-slate-600">
            <Settings size={16}/>設定
          </button>
        </div>
      </header>

      <main className="max-w-7xl mx-auto p-4 sm:p-6 space-y-6">
        {/* Metric Cards */}
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">
          {config.ShowCard_TotalValue&&<MetricCard title={`第${config.N_years}年 總帳戶價值`} value={formatCurrency(annualData[annualData.length-1]?.totalValue||0)} icon={<TrendingUp size={20} className="text-blue-600"/>} trend={annualData[annualData.length-1]?.totalValue>((config.B_mdp+config.C_gp)*10000)?'up':'down'} subtext={`初始投入: ${formatCurrency((config.B_mdp+config.C_gp)*10000)}`}/>}
          {config.ShowCard_AccumFreeCash&&<MetricCard title={`第${config.FreeCash_Year}年 累積自由現金流`} value={formatCurrency(cumulativeFreeCashAtCustomYear)} icon={<Coins size={20} className="text-green-600"/>} subtext={`累積至第 ${config.FreeCash_Year} 年`}/>}
          {config.ShowCard_TotalPP&&<MetricCard title="小水庫保單累積保費" value={formatCurrency(totalPPAmount)} icon={<PiggyBank size={20} className="text-indigo-600"/>} subtext={`繳費 ${Math.min(config.Q_policyYears,config.N_years)} 年總和`}/>}
          {config.ShowCard_FreeCashAfterPP&&<MetricCard title={`小水庫保單繳費期滿隔年(第${config.Q_policyYears+1}年)自由現金流`} value={formatCurrency(freeCashAfterPP)} icon={<Activity size={20} className="text-emerald-600"/>} highlightNegative subtext="期滿後現金流釋放"/>}
          {config.ShowCard_AccumBonus&&<MetricCard title={`第${config.Bonus_Year}年 累積加值給付金`} value={formatCurrency(bonusAtTargetYear)} icon={<Gift size={20} className="text-rose-500"/>} subtext={`累積至第 ${config.Bonus_Year} 年`}/>}
        </div>

        {/* Chart */}
        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
          <h2 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
            <TrendingUp size={20} className="text-slate-500"/>
            {config.N_years}年 資產與現金流趨勢 ({config.ViewMode==='Monthly'?'月度細節':'年度總覽'})
          </h2>
          <div style={{height:600}}>
            <ResponsiveContainer width="100%" height="100%">
              <ComposedChart data={displayData} margin={{top:30,right:20,bottom:20,left:20}}>
                <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0"/>
                <XAxis dataKey="xAxisLabel" height={80} tick={<CustomizedAxisTick customDy={config.XAxis_dy}/>} interval={config.ViewMode==='Monthly'?11:0} minTickGap={30}/>
                <YAxis yAxisId="left" orientation="left" label={{value:'現金流',angle:0,position:'top',offset:20,fill:config.Color_YAxis_Left}} tickFormatter={v=>`${new Intl.NumberFormat('zh-TW').format(v/10000)}萬`} tick={{fill:config.Color_YAxis_Left}}/>
                <YAxis yAxisId="right" orientation="right" label={{value:'資產價值',angle:0,position:'top',offset:20,fill:config.Color_YAxis_Right}} tickFormatter={v=>`${new Intl.NumberFormat('zh-TW').format(v/10000)}萬`} domain={['auto','auto']} tick={{fill:config.Color_YAxis_Right}}/>

                  }}

                {/* Capital */}
                <div className="space-y-4">
                  <h3 className="text-sm font-bold text-slate-500 uppercase tracking-wider border-b pb-1">Capital & Protection</h3>
                  <div className="bg-slate-50 p-3 rounded-lg border border-slate-200">
                    <div className="text-xs font-semibold text-slate-500">總保費 A = B + C (自動計算):
                      <span className="ml-2 text-lg text-slate-800 font-bold font-mono">{formatCurrency((parseFloat(tempConfig.B_mdp)||0)+(parseFloat(tempConfig.C_gp)||0))} 萬元</span>
                    </div>
                  </div>
                  <InputGroup label="B: 月配息本金 (MDP)" name="B_mdp" value={tempConfig.B_mdp} onChange={handleConfigChange}/>
                  <InputGroup label="C: 成長型本金 (GP)" name="C_gp" value={tempConfig.C_gp} onChange={handleConfigChange}/>
                  <InputGroup label="SA: 保額" name="SA_sumAssured" value={tempConfig.SA_sumAssured} onChange={handleConfigChange}/>
                </div>

                {/* Market Rates */}
                <div className="space-y-4">
                  <h3 className="text-sm font-bold text-slate-500 uppercase tracking-wider border-b pb-1">Market Rates</h3>
                  <div className="flex flex-col gap-1 mb-2">
                    <label className="text-xs font-semibold text-slate-600">配息型式</label>
                    <select name="DividendType" value={tempConfig.DividendType} onChange={handleConfigChange} className="w-full border border-slate-300 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none font-mono">
                      <option value="FixedAmount">固定金額型 (單位數比例)</option>
                      <option value="FixedRatio">固定比例型 (現值比例)</option>
                    </select>
                  </div>
                  <InputGroup label="D: 配息率" name="D_divRate" value={tempConfig.D_divRate} onChange={handleConfigChange} suffix="%"/>
                  <InputGroup label="E: 淨值變動率" name="E_navChange" value={tempConfig.E_navChange} onChange={handleConfigChange} suffix="%" step="0.1"/>
                  <InputGroup label="F: 成長型報酬率" name="F_growth" value={tempConfig.F_growth} onChange={handleConfigChange} suffix="%"/>
                </div>

                {/* Fees */}
                <div className="space-y-4">
                  <h3 className="text-sm font-bold text-slate-500 uppercase tracking-wider border-b pb-1">Fees</h3>
                  <InputGroup label="G: 前H年管理費率" name="G_mgmtFee" value={tempConfig.G_mgmtFee} onChange={handleConfigChange} suffix="%"/>
                  <InputGroup label="H: 高費用年期" name="H_years" value={tempConfig.H_years} onChange={handleConfigChange} suffix="年"/>
                </div>

                {/* Cash Flow */}
                <div className="space-y-4">
                  <h3 className="text-sm font-bold text-slate-500 uppercase tracking-wider border-b pb-1">Cash Flow</h3>
                  <InputGroup label="RP: 配息滾入比例" name="RP_reinvestRate" value={tempConfig.RP_reinvestRate} onChange={handleConfigChange} suffix="%"/>
                  <p className="text-xs text-slate-400 -mt-3 mb-2">*剩餘比例 {100-tempConfig.RP_reinvestRate}% 為現金給付</p>
                  <div className="grid grid-cols-2 gap-4">
                    <InputGroup label="房貸 HL" name="HL_amount" value={tempConfig.HL_amount} onChange={handleConfigChange} suffix="萬/月"/>
                    <InputGroup label="HL 年期" name="HL_years" value={tempConfig.HL_years} onChange={handleConfigChange} suffix="年"/>
                    <div className="col-span-2"><InputGroup label="HL 結束後轉入配息比例" name="Reinvest_HL_Rate" value={tempConfig.Reinvest_HL_Rate} onChange={handleConfigChange} suffix="%"/></div>
                    <InputGroup label="週轉息 FLINT" name="FLINT_amount" value={tempConfig.FLINT_amount} onChange={handleConfigChange} suffix="萬/月"/>
                    <InputGroup label="FLINT 年期" name="FLINT_years" value={tempConfig.FLINT_years} onChange={handleConfigChange} suffix="年"/>
                    <div className="col-span-2"><InputGroup label="FLINT 結束後轉入配息比例" name="Reinvest_FLINT_Rate" value={tempConfig.Reinvest_FLINT_Rate} onChange={handleConfigChange} suffix="%"/></div>
                  </div>
                  <div className="grid grid-cols-2 gap-4 mt-2">
                    <InputGroup label="小水庫保單 PP" name="PP_policy" value={tempConfig.PP_policy} onChange={handleConfigChange} suffix="萬/月" step="0.00001"/>
                    <InputGroup label="Q: 小水庫年期" name="Q_policyYears" value={tempConfig.Q_policyYears} onChange={handleConfigChange} suffix="年"/>
                    <div className="col-span-2"><InputGroup label="PP 結束後轉入配息比例" name="Reinvest_PP_Rate" value={tempConfig.Reinvest_PP_Rate} onChange={handleConfigChange} suffix="%"/></div>
                  </div>
                </div>

                {/* Rebalance */}
                <div className="space-y-4 md:col-span-2 bg-blue-50 p-4 rounded-lg border border-blue-100">
                  <h3 className="text-sm font-bold text-blue-800 uppercase tracking-wider border-b border-blue-200 pb-1 mb-3">Rebalance</h3>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <InputGroup label="RY: 啟動移轉年" name="RY_startYear" value={tempConfig.RY_startYear} onChange={handleConfigChange} suffix="年"/>
                    <InputGroup label="RG: 移轉比例 (GP -> MDP)" name="RG_rate" value={tempConfig.RG_rate} onChange={handleConfigChange} suffix="%"/>
                  </div>
                </div>
              </div>

              <div className="p-6 bg-slate-50 border-t border-slate-100 flex justify-between items-center sticky bottom-0">
                <button onClick={fetchData} className="flex items-center gap-2 text-blue-600 hover:text-blue-800 px-3 py-2 rounded-lg transition-colors text-xs font-medium mr-auto">
                  <RefreshCw size={16} className={isLoading?'animate-spin':''}/> 重新讀取雲端資料
                </button>
                <button onClick={resetConfig} className="flex items-center gap-2 text-slate-500 hover:text-slate-800 px-4 py-2 rounded-lg transition-colors">
                  <RotateCcw size={16}/>重置預設
                </button>
                <button onClick={saveConfig} className="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg shadow-md transition-all">
                  <Save size={16}/>儲存設定並重新計算
                </button>
              </div>
            </div>
          </div>
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<InvestmentDashboard/>);
</script>
</body>
</html>
