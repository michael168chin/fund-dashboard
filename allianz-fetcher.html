<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>匯率基金淨值配息擷取</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
    .loader {
      border-top-color: #3b82f6;
      -webkit-animation: spinner 1.5s linear infinite;
      animation: spinner 1.5s linear infinite;
    }
    @keyframes spinner {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; }
    .animate-fadeIn { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8 text-gray-800">
  <div id="root" class="max-w-5xl mx-auto"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    // ==========================================
    // ⚠️ 系統版本號
    // ==========================================
    const APP_VERSION = 'v1.5.3';

    // ==========================================
    // ⚠️ 您的 GAS 網頁應用程式網址
    // ==========================================
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwJwIhF2BkQLv9GLYnpplk320MVYTJ4ElQdJ9eUUkt5NmocGh04mHR3-iklZLUe0IBU/exec'; 

    const Icons = {
      Refresh:     () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 21v-5h5"/></svg>,
      Database:    () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/></svg>,
      Alert:       () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
      Check:       () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
      Clipboard:   () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>,
      Info:        () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>,
      Close:       () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>,
      Chart:       () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>,
      Settings:    () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>,
      External:    () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>,
      ShieldAlert: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>,
      Tag:         () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>,
      Eye:         () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>,
      Copy:        () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>,
      Sort:        (p) => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="m3 16 4 4 4-4"/><path d="M7 20V4"/><path d="m21 8-4-4-4 4"/><path d="M17 4v16"/></svg>,
      Wallet:      () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-5"/><path d="M16 12h5"/></svg>,
      Diamond:     () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 3h12l4 6-10 12L2 9z"/><path d="M11 3v18"/><path d="M5 3l4.6 6H14.4L19 3"/></svg>
    };

    function App() {
      const [fetchedData,        setFetchedData]        = useState(null);
      const [historyRates,       setHistoryRates]       = useState([]); 
      const [isFetching,         setIsFetching]         = useState(false);
      const [fetchError,         setFetchError]         = useState('');
      const [activeTab,          setActiveTab]          = useState('auto');
      const [manualText,         setManualText]         = useState('');
      
      const [customTargetCode,   setCustomTargetCode]   = useState('');
      const [detectedTargetCode, setDetectedTargetCode] = useState(''); 
      const [detectedTargetName, setDetectedTargetName] = useState(''); // 新增：偵測到的標的名稱
      const [isCodeConfirmed,    setIsCodeConfirmed]    = useState(false); 

      const [isWriting,          setIsWriting]          = useState(false);
      const [writeStatus,        setWriteStatus]        = useState({ type: '', msg: '' }); 

      const [writeMode,          setWriteMode]          = useState('count'); 
      const [writeCountQuick,    setWriteCountQuick]    = useState('1'); 
      const [customWriteCount,   setCustomWriteCount]   = useState(1);
      const [startDate,          setStartDate]          = useState('');
      const [endDate,            setEndDate]            = useState('');

      const [showInstructions,   setShowInstructions]   = useState(false); 
      const [showAllPreview,     setShowAllPreview]     = useState(false);
      const [isCopied,           setIsCopied]           = useState(false);
      const [sortOrder,          setSortOrder]          = useState('desc');

      // 更新日期選擇器的預設範圍
      const updateDefaultDateRange = (ratesList) => {
        if (!ratesList || ratesList.length === 0) return;
        const formattedDates = ratesList.map(r => (r.date || r.baseDate).replace(/\//g, '-'));
        const sortedDates = [...formattedDates].sort();
        setStartDate(sortedDates[0]);
        setEndDate(sortedDates[sortedDates.length - 1]);
      };

      const switchTab = (tabName) => {
        setActiveTab(tabName);
        setFetchedData(null);
        setHistoryRates([]);
        setManualText('');
        setFetchError('');
        setWriteStatus({ type: '', msg: '' });
        setDetectedTargetCode('');
        setDetectedTargetName('');
        setIsCodeConfirmed(false);
        setShowAllPreview(false);
        setIsCopied(false);
        setSortOrder('desc');
      };

      // ── 輔助函式：從清理後的文字中提取標的資訊 (v1.5.3) ──
      const extractTargetInfo = (cleanText) => {
        // 安聯代碼規則：[幣別][類型][編號] (通常 9 位)
        const allianzCodeRegex = /\b([A-Z]{3}[A-Z]{2}\d{4})\b/i;
        const codeMatch = cleanText.match(allianzCodeRegex);
        const codeFound = codeMatch ? codeMatch[1].toUpperCase() : '';

        let nameFound = '';
        if (codeFound) {
          // 嘗試尋找代碼前方最接近的一串中文字作為標的名稱
          // 通常網頁格式為：安聯人壽台幣貨幣帳戶 (NTDMD0020) 或 安聯人壽台幣貨幣帳戶 NTDMD0020
          const escapedCode = codeFound.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
          const nameRegex = new RegExp(`([^\\s\\n\\r>]{2,50})\\s*[\\(（]?${escapedCode}`, 'i');
          const nameMatch = cleanText.match(nameRegex);
          if (nameMatch) {
            // 清理掉可能的導航標籤或空白
            nameFound = nameMatch[1].replace(/.*[>|»]/, '').trim();
          }
        }
        return { code: codeFound, name: nameFound };
      };

      // 匯率解析
      const parseExchangeRateData = (htmlText) => {
        let ratesList = [];
        const cleanText = htmlText.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ');
        const regex = /(\d{4}\/\d{2}\/\d{2})\s+([0-9]+\.[0-9]+)\s+([0-9]+\.[0-9]+)/g;
        let match;
        while ((match = regex.exec(cleanText)) !== null) {
          ratesList.push({ date: match[1], buy: match[2], sell: match[3] });
        }
        if (ratesList.length > 0) {
          setFetchedData(ratesList[0]);
          setHistoryRates(ratesList);
          updateDefaultDateRange(ratesList);
          setFetchError('');
        } else { setFetchError('無法解析匯率資料。'); }
      };

      // 淨值解析
      const parseFundData = (htmlText) => {
        let fundList = [];
        const cleanText = htmlText.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ');
        const { code, name } = extractTargetInfo(cleanText);
        setDetectedTargetCode(code);
        setDetectedTargetName(name);

        const regex = /(\d{4}\/\d{2}\/\d{2})\s+([0-9]+(?:\.[0-9]+)?)/g;
        let match;
        while ((match = regex.exec(cleanText)) !== null) {
          fundList.push({ date: match[1], value: match[2] });
        }
        if (fundList.length > 0) {
          setFetchedData(fundList[0]);
          setHistoryRates(fundList);
          updateDefaultDateRange(fundList);
          setFetchError('');
        } else { setFetchError('無法解析淨值資料。'); }
      };

      // NTDMD0020 配息解析
      const parseNTDMDDividendData = (htmlText) => {
        let divList = [];
        const cleanText = htmlText.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ');
        const { name } = extractTargetInfo(cleanText);
        setDetectedTargetCode('NTDMD0020');
        setDetectedTargetName(name || '安聯人壽台幣貨幣帳戶'); // 專屬預設名稱

        const regex = /(\d{4}\/\d{2}\/\d{2})\s+([0-9]+(?:\.[0-9]+)?)\s+(\d{4}\/\d{2}\/\d{2})\s+([0-9]+(?:\.[0-9]+)?)/g;
        let match;
        while ((match = regex.exec(cleanText)) !== null) {
          divList.push({
            baseDate: match[1],
            code: 'NTDMD0020',
            nav: match[2],
            payoutDate: match[3],
            amount: match[4]
          });
        }

        if (divList.length > 0) {
          setFetchedData(divList[0]);
          setHistoryRates(divList);
          updateDefaultDateRange(divList);
          setFetchError('');
        } else { setFetchError('無法解析 NTDMD0020 配息資訊。'); }
      };

      // 全欄位配息全析解析
      const parseDividendData = (htmlText) => {
        let divList = [];
        const cleanText = htmlText.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ');
        const { code, name } = extractTargetInfo(cleanText);
        setDetectedTargetCode(code);
        setDetectedTargetName(name);

        const regex = /(\d{4}\/\d{2}\/\d{2})\s+([0-9]+(?:\.[0-9]+)?)\s+([0-9]+(?:\.[0-9]+)?)\s+(\d{4}\/\d{2}\/\d{2})\s+([0-9]+(?:\.[0-9]+)?)/g;
        let match;
        while ((match = regex.exec(cleanText)) !== null) {
          divList.push({
            baseDate: match[1],
            code: code,
            nav: match[2],
            divAmt: match[3],
            reinvestDate: match[4],
            distUnits: match[5]
          });
        }

        if (divList.length > 0) {
          setFetchedData(divList[0]);
          setHistoryRates(divList);
          updateDefaultDateRange(divList);
          setFetchError('');
        } else { setFetchError('無法解析全析配息資訊。'); }
      };

      const handleFetchRates = async () => {
        setIsFetching(true);
        try {
          const targetUrl = 'https://es.allianz.com.tw/customer/product/investment/VFBAZ/exchange-rate';
          const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
          const response = await fetch(proxyUrl);
          const data = await response.json();
          if (data && data.contents) parseExchangeRateData(data.contents);
        } catch (error) { setFetchError(`抓取失敗。`); switchTab('manual'); }
        finally { setIsFetching(false); }
      };

      const handleManualParse = () => {
        if (!manualText.trim()) { alert('請先貼上內容'); return; }
        if (activeTab === 'ntdmd-div-manual') parseNTDMDDividendData(manualText);
        else if (activeTab === 'dividend-manual') parseDividendData(manualText);
        else if (activeTab === 'fund-manual' || activeTab === 'custom-target') parseFundData(manualText);
        else parseExchangeRateData(manualText);
      };

      const filterData = useMemo(() => {
        if (!historyRates.length) return [];
        let result = [...historyRates];
        if (writeMode === 'range') {
          const sDate = startDate ? startDate.replace(/-/g, '/') : '0000/00/00';
          const eDate = endDate   ? endDate.replace(/-/g, '/')   : '9999/99/99';
          result = result.filter(r => (r.date || r.baseDate) >= sDate && (r.date || r.baseDate) <= eDate);
        } else {
          let count = writeCountQuick === 'all' ? historyRates.length : parseInt(writeCountQuick, 10);
          result = result.slice(0, Math.min(count || 1, historyRates.length));
        }
        return result;
      }, [historyRates, writeMode, writeCountQuick, startDate, endDate]);

      const finalProcessedRates = useMemo(() => {
        const result = [...filterData];
        result.sort((a, b) => {
          const dateA = (a.date || a.baseDate).replace(/\//g, '');
          const dateB = (b.date || b.baseDate).replace(/\//g, '');
          return sortOrder === 'desc' ? dateB.localeCompare(dateA) : dateA.localeCompare(dateB);
        });
        return result;
      }, [filterData, sortOrder]);

      const isCodeMismatch = useMemo(() => {
        if (activeTab !== 'custom-target') return false;
        if (detectedTargetCode && customTargetCode.trim().toUpperCase() !== detectedTargetCode.toUpperCase()) return true;
        return false;
      }, [activeTab, customTargetCode, detectedTargetCode]);

      const handleCopyData = () => {
        if (finalProcessedRates.length === 0) return;
        let contentText = "";
        if (activeTab === 'ntdmd-div-manual') {
          const headerText = "資產撥回基準日\t標的代碼\t基準日淨值\t每股稅後資產撥回金額\t資產撥回日";
          contentText = headerText + "\n" + finalProcessedRates.map(r => `${r.baseDate}\t${r.code}\t${r.nav}\t${r.amount}\t${r.payoutDate}`).join('\n');
        } else if (activeTab === 'dividend-manual') {
          const headerText = "配息/撥回基準日\t標的代碼\t基準日淨值\t每股稅後配息金額\t再投資日\t每股稅後分配單位";
          contentText = headerText + "\n" + finalProcessedRates.map(r => `${r.baseDate}\t${r.code}\t${r.nav}\t${r.divAmt}\t${r.reinvestDate}\t${r.distUnits}`).join('\n');
        } else {
          const headerText = "日期\t數值";
          contentText = headerText + "\n" + finalProcessedRates.map(r => `${r.date}\t${r.value || r.buy}`).join('\n');
        }
        const textArea = document.createElement("textarea");
        textArea.value = contentText;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        document.body.removeChild(textArea);
        setIsCopied(true);
        setTimeout(() => setIsCopied(false), 2000);
      };

      const handleWriteToSheet = async () => {
        if (activeTab.includes('div')) { alert('配息僅供預覽。'); return; }
        if (!finalProcessedRates.length) return;
        setIsWriting(true);
        try {
          const targetHeader = activeTab === 'fund-manual' ? 'NTDMD0020' : 
                               activeTab === 'custom-target' ? customTargetCode.trim().toUpperCase() : '美元兌新台幣匯率';
          for (const rate of finalProcessedRates) {
            const val = rate.value || rate.buy;
            const url = `${GAS_URL}?type=write&date=${encodeURIComponent(rate.date)}&value=${encodeURIComponent(val)}&header=${encodeURIComponent(targetHeader)}`;
            await fetch(url);
            await new Promise(r => setTimeout(r, 200));
          }
          setWriteStatus({ type: 'success', msg: '寫入完畢。' });
        } catch (e) { setWriteStatus({ type: 'error', msg: '錯誤' }); }
        finally { setIsWriting(false); }
      };

      return (
        <div className="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-100">
          
          <div className="bg-blue-800 text-white px-6 py-5 flex items-center justify-between">
            <div>
              <div className="flex items-baseline gap-2">
                <h1 className="text-2xl font-bold tracking-wide">安聯人壽匯率/基金抓取系統</h1>
                <span className="text-xs font-medium bg-blue-700 text-blue-100 px-2 py-0.5 rounded-full border border-blue-600 shadow-sm">{APP_VERSION}</span>
              </div>
              <p className="text-blue-200 text-sm mt-1 tracking-tight">自動解析匯率、淨值、標的名稱與資產撥回明細</p>
            </div>
            <button onClick={() => setShowInstructions(true)} className="flex items-center gap-1.5 bg-blue-700 hover:bg-blue-600 px-3 py-1.5 rounded-lg text-sm transition-colors border border-blue-600 shadow-sm">
              <Icons.Info /> 使用說明
            </button>
          </div>

          <div className="p-6">
            
            <div className="flex flex-wrap border-b border-gray-200 mb-6 gap-y-1">
              <button onClick={() => switchTab('auto')} className={`flex items-center gap-2 py-3 px-4 text-xs border-b-2 transition-colors ${activeTab === 'auto' ? 'border-blue-600 text-blue-600 bg-blue-50/50 font-bold' : 'border-transparent text-gray-500 hover:text-gray-700'}`}>匯率-自動</button>
              <button onClick={() => switchTab('manual')} className={`flex items-center gap-2 py-3 px-4 text-sm border-b-2 transition-colors ${activeTab === 'manual' ? 'border-orange-600 text-orange-600 bg-orange-50/50 font-bold' : 'border-transparent text-gray-500 hover:text-gray-700'}`}>匯率-手動</button>
              <button onClick={() => switchTab('fund-manual')} className={`flex items-center gap-2 py-3 px-4 text-xs border-b-2 transition-colors ${activeTab === 'fund-manual' ? 'border-purple-600 text-purple-600 bg-purple-50/50 font-bold' : 'border-transparent text-gray-500 hover:text-gray-700'}`}>NTDMD0020</button>
              <button onClick={() => switchTab('ntdmd-div-manual')} className={`flex items-center gap-2 py-3 px-4 text-xs border-b-2 transition-colors ${activeTab === 'ntdmd-div-manual' ? 'border-cyan-600 text-cyan-600 bg-cyan-50/50 font-bold' : 'border-transparent text-gray-500 hover:text-gray-700'}`}>
                <Icons.Diamond /> NTDMD0020 配息
              </button>
              <button onClick={() => switchTab('custom-target')} className={`flex items-center gap-2 py-3 px-4 text-xs border-b-2 transition-colors ${activeTab === 'custom-target' ? 'border-emerald-600 text-emerald-600 bg-emerald-50/50 font-bold' : 'border-transparent text-gray-500 hover:text-gray-700'}`}>自訂標的</button>
              <button onClick={() => switchTab('dividend-manual')} className={`flex items-center gap-2 py-3 px-4 text-xs border-b-2 transition-colors ${activeTab === 'dividend-manual' ? 'border-rose-600 text-rose-600 bg-rose-50/50 font-bold' : 'border-transparent text-gray-500 hover:text-gray-700'}`}>基金配息全析</button>
            </div>

            <div className="mb-8">
              {(activeTab !== 'auto') && (
                <div className="animate-fadeIn">
                  <div className="w-full bg-white border border-gray-200 rounded-xl p-5 shadow-sm">
                    <div className="flex justify-between items-center mb-3 text-sm">
                      <h4 className="font-bold text-gray-700 flex items-center gap-2"><Icons.Clipboard /> 貼上網頁內容</h4>
                      <a 
                        href={
                          activeTab === 'ntdmd-div-manual' ? "https://es.allianz.com.tw/customer/product/investment/VUBF/target-information/NTDMD0020/FUND_ASSET" :
                          activeTab.includes('div') ? "https://es.allianz.com.tw/customer/product/target/interest" : 
                          (activeTab === 'fund-manual' ? "https://es.allianz.com.tw/customer/product/investment/VUBF/target-information/NTDMD0020/FUND_PRICE" : "https://es.allianz.com.tw/customer/product/investment/VAS/target-information")
                        } 
                        target="_blank" 
                        className="text-blue-600 hover:underline flex items-center gap-1 font-bold"
                      >
                        {activeTab === 'ntdmd-div-manual' ? '資產撥回頁面' : activeTab.includes('div') ? '安聯人壽配息專區' : '前往連結'} <Icons.External />
                      </a>
                    </div>
                    {activeTab === 'custom-target' && (
                      <input type="text" placeholder="輸入標的代碼..." className="mb-3 p-2 border border-emerald-300 rounded-lg text-sm font-bold w-full" value={customTargetCode} onChange={(e) => setCustomTargetCode(e.target.value)} />
                    )}
                    <textarea className="w-full h-32 p-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm outline-none shadow-inner" placeholder="全選複製並在此貼上內容..." value={manualText} onChange={(e) => setManualText(e.target.value)}></textarea>
                    <button onClick={handleManualParse} className="mt-4 w-full md:w-auto bg-gray-800 hover:bg-black text-white font-bold rounded-lg px-10 py-3 transition-colors shadow-md">解析資料</button>
                  </div>
                </div>
              )}
              {activeTab === 'auto' && (
                <button onClick={handleFetchRates} className="w-full bg-blue-600 text-white font-bold py-5 rounded-xl shadow-lg hover:bg-blue-700 transition-colors">自動連線抓取匯率</button>
              )}
            </div>

            <div className="bg-gray-50 rounded-xl p-6 border border-gray-200 min-h-[200px] shadow-inner relative">
              {fetchError ? (
                <p className="text-center text-red-500 font-bold">{fetchError}</p>
              ) : fetchedData ? (
                <div className="animate-fadeIn">
                  
                  {/* v1.5.3：醒目呈現標的名稱與代碼 */}
                  <div className="mb-8 text-center">
                    <p className="text-xs font-bold text-gray-400 uppercase tracking-[0.3em] mb-2 font-mono">TARGET IDENTIFIED</p>
                    <div className="inline-block bg-white px-10 md:px-16 py-6 rounded-[2.5rem] shadow-md border border-gray-100 ring-[12px] ring-blue-50/50">
                      {detectedTargetName && (
                        <h3 className="text-lg md:text-xl font-bold text-gray-600 mb-1 leading-tight tracking-wide">
                          {detectedTargetName}
                        </h3>
                      )}
                      <h2 className="text-4xl md:text-6xl font-black text-blue-900 tracking-tighter">
                        {detectedTargetCode || customTargetCode || '未知標的'}
                      </h2>
                    </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                    <div className="bg-white border-l-4 border-blue-500 shadow-sm p-4 rounded-r-xl">
                      <p className="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-1">最近基準日</p>
                      <p className="text-xl font-black text-gray-800">{fetchedData.date || fetchedData.baseDate}</p>
                    </div>
                    {activeTab === 'ntdmd-div-manual' ? (
                      <>
                        <div className="bg-white border-l-4 border-cyan-500 shadow-sm p-4 rounded-r-xl">
                          <p className="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-1">基準日淨值</p>
                          <p className="text-xl font-black text-cyan-600">{fetchedData.nav}</p>
                        </div>
                        <div className="bg-white border-l-4 border-emerald-500 shadow-sm p-4 rounded-r-xl">
                          <p className="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-1">撥回金額</p>
                          <p className="text-xl font-black text-emerald-600">{fetchedData.amount}</p>
                        </div>
                      </>
                    ) : activeTab === 'dividend-manual' ? (
                      <>
                        <div className="bg-white border-l-4 border-rose-500 shadow-sm p-4 rounded-r-xl">
                          <p className="text-[10px] text-gray-400 font-bold uppercase tracking-widest">配息金額</p>
                          <p className="text-xl font-black text-rose-600">{fetchedData.divAmt}</p>
                        </div>
                        <div className="bg-white border-l-4 border-emerald-500 shadow-sm p-4 rounded-r-xl">
                          <p className="text-[10px] text-gray-400 font-bold uppercase tracking-widest">分配單位</p>
                          <p className="text-xl font-black text-emerald-600">{fetchedData.distUnits}</p>
                        </div>
                      </>
                    ) : (
                      <div className="bg-white border-l-4 border-emerald-500 shadow-sm p-4 rounded-r-xl lg:col-span-2">
                        <p className="text-[10px] text-gray-400 font-bold uppercase tracking-widest">主要數值</p>
                        <p className="text-xl font-black text-emerald-600">{fetchedData.value || fetchedData.buy}</p>
                      </div>
                    )}
                    <div className="bg-white border-l-4 border-gray-400 shadow-sm p-4 rounded-r-xl">
                      <p className="text-[10px] text-gray-400 font-bold uppercase tracking-widest">筆數</p>
                      <p className="text-xl font-black text-gray-600">{finalProcessedRates.length} 筆</p>
                    </div>
                  </div>

                  <div className="mt-8 border-t border-gray-200 pt-8">
                    <div className="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm flex flex-col md:flex-row gap-6 justify-between items-center">
                      <div className="flex-1 space-y-4 w-full">
                        <div className="flex items-center gap-6">
                          <label className="flex items-center gap-2 cursor-pointer text-sm font-bold"><input type="radio" checked={writeMode === 'count'} onChange={()=>setWriteMode('count')} /> 依筆數</label>
                          <label className="flex items-center gap-2 cursor-pointer text-sm font-bold"><input type="radio" checked={writeMode === 'range'} onChange={()=>setWriteMode('range')} /> 依日期</label>
                        </div>
                        {writeMode === 'count' ? (
                          <select value={writeCountQuick} onChange={(e)=>setWriteCountQuick(e.target.value)} className="bg-gray-50 border p-2.5 rounded-xl text-sm w-full outline-none">
                            <option value="1">最新 1 筆</option><option value="5">最近 5 筆</option><option value="all">全部解析內容</option>
                          </select>
                        ) : (
                          <div className="flex gap-2">
                            <input type="date" value={startDate} onChange={(e)=>setStartDate(e.target.value)} className="p-2 border rounded-xl text-sm flex-1 outline-none" />
                            <input type="date" value={endDate}   onChange={(e)=>setEndDate(e.target.value)}   className="p-2 border rounded-xl text-sm flex-1 outline-none" />
                          </div>
                        )}
                      </div>
                      <button onClick={handleWriteToSheet} disabled={isWriting || activeTab.includes('div')} className={`px-12 py-4 text-white font-black rounded-xl shadow-xl transition-all active:scale-95 ${isWriting || activeTab.includes('div') ? 'bg-gray-300' : 'bg-blue-600 hover:bg-blue-700'}`}>
                        {isWriting ? '寫入中...' : activeTab.includes('div') ? '配息僅供預覽' : '批次寫入試算表'}
                      </button>
                    </div>
                    
                    <div className="mt-12">
                      <div className="flex flex-col sm:flex-row justify-between items-end mb-4 px-1 gap-4">
                        <div className="text-xs font-bold text-gray-400 uppercase tracking-widest flex items-center gap-2">數據預覽清單</div>
                        <div className="flex flex-wrap items-center gap-2">
                          <button onClick={() => setSortOrder(sortOrder === 'desc' ? 'asc' : 'desc')} className="text-xs font-bold text-purple-600 bg-purple-50 px-4 py-2.5 rounded-xl border border-purple-100 flex items-center gap-1"><Icons.Sort className={sortOrder === 'asc' ? 'rotate-180' : ''} /> 排序</button>
                          <button onClick={handleCopyData} className={`text-xs font-bold px-4 py-2.5 rounded-xl border flex items-center gap-1 transition-all ${isCopied ? 'bg-green-600 border-green-600 text-white' : 'bg-white text-gray-600 shadow-sm'}`}>
                             {isCopied ? <Icons.Check /> : <Icons.Copy />} {isCopied ? '已複製' : '複製全欄位'}
                          </button>
                          <button onClick={() => setShowAllPreview(!showAllPreview)} className="text-xs font-bold text-gray-600 bg-gray-100 px-4 py-2.5 rounded-xl border shadow-sm">{showAllPreview ? '縮減' : '展開全部'}</button>
                        </div>
                      </div>
                      
                      <div className="max-h-[500px] overflow-auto border border-gray-200 rounded-2xl bg-white shadow-inner custom-scrollbar">
                        <table className="w-full text-xs text-left border-collapse">
                          <thead className="bg-gray-50 sticky top-0 font-bold text-gray-500 border-b z-10">
                            {activeTab === 'ntdmd-div-manual' ? (
                              <tr>
                                <th className="px-4 py-4 whitespace-nowrap">基準日</th>
                                <th className="px-4 py-4 whitespace-nowrap">代碼</th>
                                <th className="px-4 py-4 whitespace-nowrap text-cyan-600">基準日淨值</th>
                                <th className="px-4 py-4 whitespace-nowrap text-emerald-600 font-black">稅後撥回金額</th>
                                <th className="px-4 py-4 whitespace-nowrap">撥回日</th>
                              </tr>
                            ) : activeTab === 'dividend-manual' ? (
                              <tr>
                                <th className="px-4 py-4 whitespace-nowrap">基準日</th>
                                <th className="px-4 py-4 whitespace-nowrap">代碼</th>
                                <th className="px-4 py-4 whitespace-nowrap">基準日淨值</th>
                                <th className="px-4 py-4 whitespace-nowrap text-rose-600 font-black">稅後配息金額</th>
                                <th className="px-4 py-4 whitespace-nowrap">再投資日</th>
                                <th className="px-4 py-4 whitespace-nowrap text-emerald-600 font-black">分配單位</th>
                              </tr>
                            ) : (
                              <tr>
                                <th className="px-4 py-4">日期</th>
                                <th className="px-4 py-4">標的代碼</th>
                                <th className="px-4 py-4">數值</th>
                              </tr>
                            )}
                          </thead>
                          <tbody className="divide-y divide-gray-100">
                            {(showAllPreview ? finalProcessedRates : finalProcessedRates.slice(0, 10)).map((r, i) => (
                              <tr key={i} className="hover:bg-blue-50/30 transition-colors">
                                {activeTab === 'ntdmd-div-manual' ? (
                                  <>
                                    <td className="px-4 py-4 font-bold text-gray-800">{r.baseDate}</td>
                                    <td className="px-4 py-4 text-blue-800 font-mono">{r.code}</td>
                                    <td className="px-4 py-4 font-bold text-cyan-600">{r.nav}</td>
                                    <td className="px-4 py-4 font-black text-emerald-600 text-sm">{r.amount}</td>
                                    <td className="px-4 py-4 text-gray-500">{r.payoutDate}</td>
                                  </>
                                ) : activeTab === 'dividend-manual' ? (
                                  <>
                                    <td className="px-4 py-4 font-bold text-gray-800">{r.baseDate}</td>
                                    <td className="px-4 py-4 font-medium text-blue-800 font-mono">{r.code}</td>
                                    <td className="px-4 py-4 font-bold text-gray-600">{r.nav}</td>
                                    <td className="px-4 py-4 font-black text-rose-600 text-sm">{r.divAmt}</td>
                                    <td className="px-4 py-4 text-gray-500">{r.reinvestDate}</td>
                                    <td className="px-4 py-4 font-black text-emerald-600 text-sm">{r.distUnits}</td>
                                  </>
                                ) : (
                                  <>
                                    <td className="px-4 py-4 font-medium text-gray-700">{r.date}</td>
                                    <td className="px-4 py-4 text-gray-400 font-mono">{detectedTargetCode || customTargetCode}</td>
                                    <td className="px-4 py-4 font-black text-blue-600 text-sm">{r.value || r.buy}</td>
                                  </>
                                )}
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </div>
                </div>
              ) : (
                <div className="text-center text-gray-300 py-16 flex flex-col items-center"><Icons.Clipboard className="mb-4 opacity-20 w-12 h-12"/><p className="font-bold">請貼上內容並解析資料以進行預覽。</p></div>
              )}
            </div>
          </div>

          {showInstructions && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm animate-fadeIn">
              <div className="bg-white rounded-3xl shadow-2xl w-full max-w-2xl p-10 text-sm">
                <h3 className="text-2xl font-black mb-8 flex items-center gap-3 border-b pb-4 text-gray-800"><Icons.Info /> 版本 v1.5.3 更新說明</h3>
                <div className="space-y-6 text-gray-600 leading-relaxed overflow-y-auto max-h-[60vh] pr-2 custom-scrollbar">
                  <div className="bg-blue-50 p-5 rounded-2xl border border-blue-100">
                    <p className="text-blue-900 font-bold mb-2 underline decoration-blue-300 underline-offset-4">🏷️ 標的名稱自動識別：</p>
                    <p className="text-blue-800">在「配息」與「自訂標的」分頁解析後，系統會自動在預覽區上方顯示提取出的標的完整名稱（例如：安聯人壽台幣貨幣帳戶），方便識別。</p>
                  </div>
                  <div>
                    <p className="font-bold text-gray-800 mb-2 underline decoration-cyan-300 underline-offset-4">1. NTDMD0020 配息：</p>
                    <p>已依照需求將表格欄位對調，現在第 4 欄為稅後撥回金額，第 5 欄為撥回日。複製時格式完全同步。</p>
                  </div>
                  <div>
                    <p className="font-bold text-gray-800 mb-2 underline decoration-rose-300 underline-offset-4">2. 數據複製優化：</p>
                    <p>「複製全欄位」功能會將畫面上過濾與排序後的所有欄位一次匯出至剪貼簿，適合直接貼入 Excel。</p>
                  </div>
                </div>
                <button onClick={() => setShowInstructions(false)} className="mt-10 w-full bg-gray-900 hover:bg-black text-white font-black py-4 rounded-2xl shadow-xl transition-all active:scale-95">關閉說明</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
